<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Profile')}"></head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <!-- Main Content -->
    <main class="pt-20 pb-10">
        <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">

            <!-- Profile Card -->
            <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                <!-- Header -->
                <div class="bg-gradient-to-r from-purple-600 to-pink-600 p-8 text-center">
                    <div class="w-24 h-24 mx-auto mb-4 rounded-full border-4 border-white shadow-lg overflow-hidden bg-white">
                        <img th:if="${user.profilePhotoUrl != null}" th:src="${user.profilePhotoUrl}"
                             class="w-full h-full object-cover" alt="Profile">
                        <div th:unless="${user.profilePhotoUrl != null}"
                             class="w-full h-full flex items-center justify-center bg-gradient-to-r from-purple-400 to-pink-400 text-white text-3xl font-bold"
                             th:text="${#strings.substring(user.name, 0, 1).toUpperCase()}">U</div>
                    </div>
                    <h1 class="text-2xl font-bold text-white" th:text="${user.name}">User Name</h1>
                    <p class="text-white/80" th:text="${user.email}">email@example.com</p>
                </div>

                <!-- Profile Details -->
                <div class="p-8">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4">Account Details</h2>

                    <dl class="space-y-4">
                        <div class="flex justify-between py-3 border-b border-gray-100">
                            <dt class="text-gray-500">Full Name</dt>
                            <dd class="font-medium text-gray-900" th:text="${user.name}">User Name</dd>
                        </div>
                        <div class="flex justify-between py-3 border-b border-gray-100">
                            <dt class="text-gray-500">Email</dt>
                            <dd class="font-medium text-gray-900" th:text="${user.email}">email@example.com</dd>
                        </div>
                        <div th:if="${user.phone != null}" class="flex justify-between py-3 border-b border-gray-100">
                            <dt class="text-gray-500">Phone</dt>
                            <dd class="font-medium text-gray-900" th:text="${user.phone}">9876543210</dd>
                        </div>
                        <div class="flex justify-between py-3 border-b border-gray-100">
                            <dt class="text-gray-500">Account Type</dt>
                            <dd class="font-medium text-gray-900">
                                <span th:if="${user.provider == 'google'}" class="inline-flex items-center">
                                    <svg class="w-4 h-4 mr-1" viewBox="0 0 24 24">
                                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                    </svg>
                                    Google Account
                                </span>
                                <span th:unless="${user.provider == 'google'}">Email & Password</span>
                            </dd>
                        </div>
                        <div class="flex justify-between py-3 border-b border-gray-100">
                            <dt class="text-gray-500">Member Since</dt>
                            <dd class="font-medium text-gray-900" th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">Date</dd>
                        </div>
                        <div class="flex justify-between py-3">
                            <dt class="text-gray-500">Account Role</dt>
                            <dd>
                                <span th:if="${user.role.name() == 'ADMIN'}"
                                      class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800">
                                    Admin
                                </span>
                                <span th:unless="${user.role.name() == 'ADMIN'}"
                                      class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                                    User
                                </span>
                            </dd>
                        </div>
                    </dl>
                </div>

                <!-- Actions -->
                <div class="px-8 pb-8">
                    <div class="flex space-x-4">
                        <a href="/dashboard"
                           class="flex-1 py-2 text-center border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 font-medium">
                            Back to Dashboard
                        </a>
                        <form th:action="@{/logout}" method="post" class="flex-1">
                            <button type="submit"
                                    class="w-full py-2 text-center bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium">
                                Logout
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
