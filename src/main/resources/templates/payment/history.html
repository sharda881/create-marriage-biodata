<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Payment History')}"></head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <!-- Main Content -->
    <main class="pt-20 pb-10">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">

            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-900">Payment History</h1>
                <p class="text-gray-600 mt-1">View all your payment transactions</p>
            </div>

            <!-- Payments List -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100">
                <!-- Empty State -->
                <div th:if="${#lists.isEmpty(payments)}" class="p-12 text-center">
                    <div class="w-16 h-16 mx-auto mb-4 bg-gray-100 rounded-full flex items-center justify-center">
                        <span class="text-3xl">💳</span>
                    </div>
                    <h3 class="text-lg font-medium text-gray-900">No payments yet</h3>
                    <p class="text-gray-500 mt-1">Your payment history will appear here.</p>
                </div>

                <!-- Payments Table -->
                <div th:unless="${#lists.isEmpty(payments)}" class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Bio-Data</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Transaction ID</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Amount</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <tr th:each="payment : ${payments}" class="hover:bg-gray-50">
                                <td class="px-6 py-4">
                                    <p class="font-medium text-gray-900" th:text="${payment.bioDataFullName}">Bio-Data Name</p>
                                </td>
                                <td class="px-6 py-4">
                                    <code class="bg-gray-100 px-2 py-1 rounded text-sm font-mono" th:text="${payment.transactionReferenceId}">TXN123</code>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="font-medium">₹<span th:text="${payment.amount}">99</span></span>
                                </td>
                                <td class="px-6 py-4">
                                    <span th:if="${payment.status.name() == 'PENDING'}"
                                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">
                                        ⏳ Pending
                                    </span>
                                    <span th:if="${payment.status.name() == 'APPROVED'}"
                                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                        ✓ Approved
                                    </span>
                                    <span th:if="${payment.status.name() == 'REJECTED'}"
                                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">
                                        ✗ Rejected
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-sm text-gray-500"
                                    th:text="${#temporals.format(payment.createdAt, 'dd MMM yyyy')}">Date</td>
                                <td class="px-6 py-4 text-right">
                                    <a th:href="@{/payment/status/{id}(id=${payment.id})}"
                                       class="text-purple-600 hover:text-purple-800 text-sm">
                                        View Details
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Back Link -->
            <div class="mt-6">
                <a href="/dashboard" class="text-gray-600 hover:text-gray-800">← Back to Dashboard</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
