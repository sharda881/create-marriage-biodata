<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Access Denied')}"></head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="text-center px-4">
        <div class="text-8xl mb-4">🚫</div>
        <h1 class="text-4xl font-bold text-gray-900 mb-4">Access Denied</h1>
        <p class="text-gray-600 mb-8" th:text="${message != null} ? ${message} : 'You do not have permission to access this resource.'">
            You do not have permission to access this resource.
        </p>
        <a href="/dashboard" class="px-6 py-3 bg-purple-600 text-white font-semibold rounded-lg hover:bg-purple-700">
            Go to Dashboard
        </a>
    </div>
</body>
</html>
