<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Server Error')}"></head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="text-center px-4">
        <div class="text-8xl mb-4">⚠️</div>
        <h1 class="text-4xl font-bold text-gray-900 mb-4">Something Went Wrong</h1>
        <p class="text-gray-600 mb-8" th:text="${message != null} ? ${message} : 'An unexpected error occurred. Please try again later.'">
            An unexpected error occurred. Please try again later.
        </p>
        <div class="space-x-4">
            <a href="/dashboard" class="px-6 py-3 bg-purple-600 text-white font-semibold rounded-lg hover:bg-purple-700">
                Go to Dashboard
            </a>
            <button onclick="location.reload()" class="px-6 py-3 border border-gray-300 text-gray-700 font-semibold rounded-lg hover:bg-gray-50">
                Try Again
            </button>
        </div>
    </div>
</body>
</html>
