<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Preview Bio-Data')}"></head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <!-- Main Content -->
    <main class="pt-20 pb-10">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">

            <!-- Alerts -->
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <!-- Header - Mobile Responsive -->
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-6 gap-4">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">Preview Bio-Data</h1>
                    <p class="text-gray-600 mt-1 text-sm sm:text-base">Review your bio-data before downloading</p>
                </div>
                <div class="flex flex-wrap gap-2 sm:gap-3">
                    <a th:href="@{/biodata/edit/{id}(id=${bioData.id})}"
                       class="px-3 py-2 text-sm border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                        ✏️ Edit
                    </a>
                    <a th:if="${!needsPayment}" th:href="@{/biodata/download/{id}(id=${bioData.id})}"
                       class="px-4 py-2 text-sm bg-green-600 text-white rounded-lg hover:bg-green-700">
                        📥 Download PDF
                    </a>
                    <a th:if="${needsPayment}" th:href="@{/payment/checkout/{id}(id=${bioData.id})}"
                       class="px-4 py-2 text-sm bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                        💳 Pay & Download
                    </a>
                </div>
            </div>

            <!-- Template Selector - Mobile Responsive -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                    <div>
                        <span class="text-sm font-medium text-gray-700">Current Template: </span>
                        <span class="text-sm font-bold text-purple-600" th:text="${template.displayName}">Template Name</span>
                        <span class="text-xs text-gray-400 ml-2">(Template ID: <span th:text="${template.templateId}">id</span>)</span>
                        <br/>
                        <span class="text-xs text-red-500">DEBUG - BioData.selectedTemplateId: <span th:text="${bioData.selectedTemplateId}">stored</span></span>
                    </div>
                    <form th:action="@{/biodata/{id}/template(id=${bioData.id})}" method="post" class="flex items-center gap-3">
                        <select name="templateId" class="flex-1 sm:flex-none px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option th:each="t : ${templates}"
                                    th:value="${t.templateId}"
                                    th:selected="${t.templateId == bioData.selectedTemplateId}"
                                    th:text="${t.displayName}">Template</option>
                        </select>
                        <button type="submit" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200">
                            Change
                        </button>
                    </form>
                </div>
            </div>

            <!-- Bio-Data Preview - Conditional Template Rendering -->
            <div class="shadow-2xl overflow-hidden" id="biodata-preview">

                <!-- TRADITIONAL TEMPLATE -->
                <div th:if="${template.templateId.equals('traditional')}" th:insert="~{biodata/templates/traditional-preview :: content}"></div>

                <!-- ROYAL TEMPLATE -->
                <div th:if="${template.templateId.equals('royal')}" th:insert="~{biodata/templates/royal-preview :: content}"></div>

                <!-- MODERN TEMPLATE -->
                <div th:if="${template.templateId.equals('modern')}" th:insert="~{biodata/templates/modern-preview :: content}"></div>

                <!-- ELEGANT TEMPLATE -->
                <div th:if="${template.templateId.equals('elegant')}" th:insert="~{biodata/templates/elegant-preview :: content}"></div>

                <!-- FLORAL TEMPLATE -->
                <div th:if="${template.templateId.equals('floral')}" th:insert="~{biodata/templates/floral-preview :: content}"></div>

                <!-- SIMPLE TEMPLATE -->
                <div th:if="${template.templateId.equals('simple')}" th:insert="~{biodata/templates/simple-preview :: content}"></div>

                <!-- DEFAULT FALLBACK (for unknown templates like 'premium') -->
                <div th:if="${!template.templateId.equals('traditional') and !template.templateId.equals('royal') and !template.templateId.equals('modern') and !template.templateId.equals('elegant') and !template.templateId.equals('floral') and !template.templateId.equals('simple')}"
                     th:insert="~{biodata/templates/traditional-preview :: content}"></div>

            </div>

            <!-- Action Buttons - Mobile Responsive -->
            <div class="mt-6 flex flex-col sm:flex-row justify-center gap-3 sm:gap-4">
                <a href="/dashboard" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-center">
                    ← Back to Dashboard
                </a>
                <a th:if="${!needsPayment}" th:href="@{/biodata/download/{id}(id=${bioData.id})}"
                   class="px-6 py-3 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700 shadow-lg text-center">
                    📥 Download PDF
                </a>
                <a th:if="${needsPayment}" th:href="@{/payment/checkout/{id}(id=${bioData.id})}"
                   class="px-6 py-3 bg-purple-600 text-white font-semibold rounded-lg hover:bg-purple-700 shadow-lg text-center">
                    💳 Pay ₹99 & Download
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
